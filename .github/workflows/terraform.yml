name: Terraform

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/450428991040/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: sa-iac@prj-novo-490222.iam.gserviceaccount.com

    - uses: hashicorp/setup-terraform@v3

    - run: terraform init
    - run: terraform plan
    - run: terraform apply -auto-approve
