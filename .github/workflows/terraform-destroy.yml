name: Terraform Destroy

on:
  workflow_dispatch: 

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/450428991040/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: sa-iac@prj-novo-490222.iam.gserviceaccount.com

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init 
      run: terraform init
    - name: Terraform Destroy
      run: terraform destroy -auto-approve
